<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>期末心理气象站 — 教师入口</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #E3F2FD, #BBDEFB);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: #fff; border-radius: 24px; padding: 40px 32px;
    max-width: 400px; width: 90%; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  h1 { font-size: 24px; color: #1565C0; margin-bottom: 8px; }
  p { font-size: 14px; color: #888; margin-bottom: 10px; }
  .qr-section { margin: 4px 0 12px; }
  .qr-section img { max-width: 100%; width: 180px; height: auto; border-radius: 12px; border: 2px solid #BBDEFB; }
  .qr-hint { font-size: 12px; color: #999; margin: 6px 0 12px; }
  a {
    display: block; padding: 16px; margin: 12px 0; border-radius: 14px;
    text-decoration: none; font-size: 16px; font-weight: 600; transition: all 0.2s;
  }
  .btn-teacher { background: #1565C0; color: #fff; }
  .btn-teacher:hover { background: #0D47A1; }

  @media (max-width: 400px) {
    .card { padding: 24px 16px; border-radius: 16px; }
    h1 { font-size: 20px; }
    .qr-section img { width: 150px; }
    a { padding: 14px; font-size: 15px; }
  }
</style>
</head>
<body>
<div class="card">
  <h1>📊 期末心理气象站</h1>
  <p>教师入口 · 扫码查看报告</p>
  <div class="qr-section">
    <img id="qr-img" src="" alt="扫码查看报告">
    <p class="qr-hint">📱 手机扫码进入仪表盘</p>
  </div>
  <a href="dashboard.html" class="btn-teacher">📊 进入教师仪表盘</a>
</div>
<script>
document.getElementById('qr-img').src =
  'https://quickchart.io/qr?size=200&text=' + encodeURIComponent('https://student-wellbeing-site.netlify.app/dashboard.html');
</script>
</body>
</html>

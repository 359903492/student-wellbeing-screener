<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>期末心理气象站</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #FFF3E0, #FFE0B2);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: #fff; border-radius: 24px; padding: 40px 32px;
    max-width: 400px; width: 90%; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  h1 { font-size: 24px; color: #E65100; margin-bottom: 8px; }
  p { font-size: 14px; color: #888; margin-bottom: 10px; }
  .qr-section { margin: 4px 0 12px; }
  .qr-section img { max-width: 100%; width: 180px; height: auto; border-radius: 12px; border: 2px solid #FFE0B2; }

  @media (max-width: 400px) {
    .card { padding: 24px 16px; border-radius: 16px; }
    h1 { font-size: 20px; }
    .qr-section img { width: 150px; }
    a { padding: 14px; font-size: 15px; }
  }
  .qr-hint { font-size: 12px; color: #999; margin: 6px 0 12px; }
  a {
    display: block; padding: 16px; margin: 12px 0; border-radius: 14px;
    text-decoration: none; font-size: 16px; font-weight: 600; transition: all 0.2s;
  }
  .btn-student { background: #FF9800; color: #fff; }
  .btn-student:hover { background: #F57C00; }
  .btn-teacher { background: #fff; color: #FF9800; border: 2px solid #FF9800; }
  .btn-teacher:hover { background: #FFF3E0; }
</style>
</head>
<body>
<div class="card">
  <h1>☁️ 期末心理气象站</h1>
  <p>学生入口 · 手机扫码填写问卷</p>
  <div class="qr-section">
    <img id="qr-img" src="" alt="扫码填写问卷">
    <p class="qr-hint">📱 手机扫码填写问卷</p>
  </div>
  <a href="student.html" class="btn-student">📝 开始填写问卷</a>
</div>
<script>
document.getElementById('qr-img').src =
  'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent('https://student-wellbeing-site.netlify.app/student.html');
</script>
</body>
</html>
